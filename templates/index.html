<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Img-gen — Free Background Remover</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f11;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 2.4rem; font-weight: 800; color: #a78bfa; letter-spacing: -1px; }
    header p  { margin-top: 8px; color: #9ca3af; font-size: 1rem; }

    .card {
      background: #1a1a24;
      border: 1px solid #2d2d3f;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }

    /* Drop zone */
    .dropzone {
      border: 2px dashed #4c4c6a;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .dropzone:hover, .dropzone.drag-over {
      border-color: #a78bfa;
      background: #1f1f2e;
    }
    .dropzone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .dropzone .icon { font-size: 3rem; margin-bottom: 12px; }
    .dropzone p { color: #9ca3af; font-size: .95rem; }
    .dropzone span { color: #a78bfa; font-weight: 600; }

    /* Preview */
    #preview-wrap {
      display: none;
      margin-top: 20px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2d2d3f;
      position: relative;
    }
    #preview-wrap img {
      width: 100%;
      display: block;
      max-height: 280px;
      object-fit: contain;
      background: repeating-conic-gradient(#2a2a3a 0% 25%, #1a1a2a 0% 50%) 0 0 / 20px 20px;
    }
    #filename-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
      font-size: .8rem; color: #d1d5db; padding: 6px 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Button */
    .btn {
      display: block; width: 100%; margin-top: 20px;
      padding: 14px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: opacity .2s, transform .15s;
    }
    .btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* Progress */
    #progress-wrap { display: none; margin-top: 16px; }
    .progress-bar-bg {
      height: 6px; background: #2d2d3f; border-radius: 99px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; width: 0%; background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 99px; transition: width .3s ease;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    #status-text { margin-top: 8px; font-size: .85rem; color: #9ca3af; text-align: center; }

    /* Result */
    #result-wrap { display: none; margin-top: 20px; }
    #result-wrap img {
      width: 100%; display: block; max-height: 280px; object-fit: contain;
      border-radius: 10px; border: 1px solid #2d2d3f;
      background: repeating-conic-gradient(#2a2a3a 0% 25%, #1a1a2a 0% 50%) 0 0 / 20px 20px;
    }
    .dl-btn {
      display: block; width: 100%; margin-top: 12px;
      padding: 13px; border: 1.5px solid #a78bfa; border-radius: 10px;
      background: transparent; color: #a78bfa;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      text-align: center; text-decoration: none;
      transition: background .2s, color .2s;
    }
    .dl-btn:hover { background: #a78bfa; color: #0f0f11; }

    #error-msg {
      display: none; margin-top: 14px; padding: 12px 16px;
      background: #2d1515; border: 1px solid #7f1d1d;
      border-radius: 8px; color: #fca5a5; font-size: .9rem;
    }

    footer { margin-top: 40px; font-size: .8rem; color: #4b5563; text-align: center; }
    footer a { color: #7c3aed; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <h1>✨ Img-gen</h1>
  <p>Remove image backgrounds instantly — 100% free, runs locally, no data sent anywhere.</p>
</header>

<div class="card">
  <div class="dropzone" id="dropzone">
    <input type="file" id="file-input" accept="image/*" />
    <div class="icon">🖼️</div>
    <p><span>Click to upload</span> or drag & drop</p>
    <p style="margin-top:6px;font-size:.82rem;">JPG, PNG, WebP, BMP — up to 20 MB</p>
  </div>

  <div id="preview-wrap">
    <img id="preview-img" src="" alt="Preview" />
    <div id="filename-label"></div>
  </div>

  <button class="btn" id="remove-btn" disabled>Remove Background</button>

  <div id="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
    <div id="status-text">Processing with AI… this may take a few seconds ⏳</div>
  </div>

  <div id="error-msg"></div>

  <div id="result-wrap">
    <img id="result-img" src="" alt="Result" />
    <a class="dl-btn" id="dl-link" href="#" download>⬇️ Download PNG</a>
  </div>
</div>

<footer>
  Powered by <a href="https://github.com/danielgatis/rembg" target="_blank">rembg</a> &amp; U2Net AI model &nbsp;|&nbsp;
  <a href="https://github.com/yashasvm208/Img-gen" target="_blank">GitHub</a>
</footer>

<script>
  const dropzone   = document.getElementById('dropzone');
  const fileInput  = document.getElementById('file-input');
  const removeBtn  = document.getElementById('remove-btn');
  const previewWrap= document.getElementById('preview-wrap');
  const previewImg = document.getElementById('preview-img');
  const filenameLabel = document.getElementById('filename-label');
  const progressWrap  = document.getElementById('progress-wrap');
  const progressBar   = document.getElementById('progress-bar');
  const statusText    = document.getElementById('status-text');
  const resultWrap    = document.getElementById('result-wrap');
  const resultImg     = document.getElementById('result-img');
  const dlLink        = document.getElementById('dl-link');
  const errorMsg      = document.getElementById('error-msg');

  let selectedFile = null;

  // Drag-over highlight
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      filenameLabel.textContent = file.name;
      previewWrap.style.display = 'block';
    };
    reader.readAsDataURL(file);
    removeBtn.disabled = false;
    resultWrap.style.display = 'none';
    errorMsg.style.display = 'none';
  }

  removeBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    removeBtn.disabled = true;
    progressWrap.style.display = 'block';
    progressBar.style.width = '30%';
    statusText.textContent = 'Uploading image…';
    resultWrap.style.display = 'none';
    errorMsg.style.display = 'none';

    const formData = new FormData();
    formData.append('image', selectedFile);

    try {
      progressBar.style.width = '60%';
      statusText.textContent = 'AI is removing the background… ⏳';

      const resp = await fetch('/remove', { method: 'POST', body: formData });

      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        throw new Error(data.error || `Server error ${resp.status}`);
      }

      const blob = await resp.blob();
      const url  = URL.createObjectURL(blob);

      progressBar.style.width = '100%';
      statusText.textContent  = '✅ Done!';

      resultImg.src  = url;
      dlLink.href    = url;
      dlLink.download = selectedFile.name.replace(/\.[^.]+$/, '') + '_nobg.png';
      resultWrap.style.display = 'block';
    } catch (err) {
      errorMsg.textContent = '❌ ' + err.message;
      errorMsg.style.display = 'block';
    } finally {
      setTimeout(() => {
        progressWrap.style.display = 'none';
        progressBar.style.width = '0%';
        removeBtn.disabled = false;
      }, 1200);
    }
  });
</script>
</body>
</html>
